<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHCK FASHION</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-[Poppins] mx-auto p-0 box-border text-black">
    <div class="grid grid-cols-[5fr_4fr_5fr]">
      <div class="ml-25">
        <nav
          class="w-full flex flex-row justify-between items-center pr-15 py-6 sticky top 0 z-100 bg-white"
        >
          <div class="flex gap-2 justify-start items-center">
            <div class="flex flex-col justify-center items-center gap-2 w-4">
              <div class="w-5 h-0.5 bg-black"></div>
              <div class="w-5 h-0.5 bg-black"></div>
            </div>
            <a href="#" class="font-semibold">Menu</a>
          </div>

          <div class="flex gap-6 font-semibold">
            <p>&lt</p>
            <p>GO BACK</p>
          </div>

          
        </nav>

        <section class="mt-30 flex flex-col gap-16 justify-start items-center">
          <div class="flex flex-col gap-6">
            <h1 class="text-5xl font-[Prata]">
              Flounce Off-the- Shoulder Crop Tropby SHCHK
            </h1>
            <div class="flex gap-4">
              <p class="font-semibold">$22.00</p>
              <del class="text-[#4f4e4e]">$44.00</del>
            </div>
          </div>

          <article class="flex flex-col gap-4">
            <h2 class="font-bold">DETAILS</h2>
            <p>
              A knit top featuring an elasticized off the shoulder neckline,
              short sleeves, a flounce layer, elasticized hem, and a cropped
              sillhoutte.
            </p>
          </article>
    
          <a href="https://www.youtube.com/watch?v=eiLFqHYBLAI"><img src="pic.png" alt="men fashion wears" class="w-[40%]  h-[20vh]items-start justify-start"></a>
  
        </section>
      </div>

      <div
        class="relative flex flex-col w-full h-screen bg-slate-50 overflow-hidden"
      >
        <div class="absolute inset-0 flex justify-center pointer-events-none">
          <div class="w-[1px] h-full bg-gray-300 opacity-50"></div>
        </div>

        <div class="absolute top-0 right-0 p-10 z-20">
          <h3 class="text-xs font-bold tracking-[0.2em] text-gray-800">
            SHCHK<sup class="text-[10px] ml-0.5">TM</sup>
          </h3>
        </div>

        <div class="relative flex-1 flex items-center justify-center z-100">
          <img
            src="fashion man.jpg"
            alt="Fashion Man"
            class="h-full w-auto object-contain grayscale contrast-125 brightness-110 mix-blend-multiply"
          />
        </div>
      </div>
       <div class=" flex gap-9 justify-center items-center ">
      <div class="pl-90 pt-6 w-full h-[100vh]">

         <!-- Right: Wishlist & Cart -->
          <div class="flex items-center gap-6">
            <button class="flex items-center gap-2 text-xs tracking-widest uppercase hover:opacity-70 transition-opacity font-bold fon-[poppins]">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="1" stroke="currentColor" stroke-width="1.5">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                Wishlist
            </button>
            <button class="flex items-center gap-2 text-xs tracking-widest uppercase hover:opacity-70 transition-opacity font-bold font-[poppins]">
                <svg xmlns="http://www.w3.org/2000/svg" fill="1" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
              </svg>
                Cart
            </button>
          </div>

<!-- Right Column: Purchase Options -->
        <div class="w-[30%] divider-left px-12 py-12 flex flex-col justify-center">
            
            <!-- Size Selection -->
            <div class="mb-10">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xs font-semibold tracking-widest uppercase">Choose Size</h2>
                    <button class="text-[10px] text-gray-400 underline hover:no-underline hover:text-black transition-colors uppercase tracking-wider">Size Chart</button>
                </div>

                <div class="flex gap-9 items-center justify-center">
                    <button class="size-btn">S</button>
                    <button class="size-btn active hover:bg-white hover:text-black">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                </div>
            </div>

           


      
       
       

        </div>
        </div>
      </div>
    </div>
  </body>
</html>
