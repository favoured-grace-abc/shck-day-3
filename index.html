<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHCK FASHION</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Poppins:wght@300;400;600;700&family=Prata&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .font-prata { font-family: 'Prata', serif; }
    </style>
</head>

<body class="mx-auto p-0 box-border text-black bg-white">
    <div class="grid grid-cols-1 lg:grid-cols-[5fr_4fr_5fr] min-h-screen">
        
        <div class="px-10 lg:pl-20 py-10 flex flex-col border-r border-gray-100">
            <nav class="flex justify-between items-center mb-20">
                <div class="flex gap-3 items-center cursor-pointer">
                    <div class="flex flex-col gap-1 w-5">
                        <div class="w-full h-0.5 bg-black"></div>
                        <div class="w-full h-0.5 bg-black"></div>
                    </div>
                    <span class="font-semibold text-sm tracking-widest uppercase">Menu</span>
                </div>
                <div class="flex gap-4 items-center font-semibold text-sm cursor-pointer group">
                    <span>&lt;</span>
                    <span class="tracking-widest uppercase">Go Back</span>
                </div>
            </nav>

            <section class="flex flex-col gap-12">
                <div class="flex flex-col gap-4">
                    <h1 class="text-5xl font-prata leading-tight">
                        Flounce Off-the-Shoulder Crop Top
                    </h1>
                    <div class="flex gap-4 items-center text-xl">
                        <p class="font-bold">$22.00</p>
                        <del class="text-gray-400">$44.00</del>
                    </div>
                </div>

                <article class="flex flex-col gap-4 max-w-md">
                    <h2 class="font-bold text-xs tracking-widest uppercase">Details</h2>
                    <p class="text-gray-600 leading-relaxed text-sm">
                        A knit top featuring an elasticized off the shoulder neckline,
                        short sleeves, a flounce layer, elasticized hem, and a cropped
                        silhouette.
                    </p>
                </article>

                <a href="https://www.youtube.com/watch?v=eiLFqHYBLAI" class="w-40 hover:opacity-80 transition-opacity">
                    <img src="pic.png" alt="Video Preview" class="w-full h-24 object-cover border border-gray-200">
                </a>
            </section>
        </div>

        <div class="relative bg-[#F9F9F9] flex flex-col items-center justify-center overflow-hidden border-r border-gray-100">
            <div class="absolute inset-y-0 left-1/2 w-[1px] bg-gray-200 -z-0"></div>
            
            <div class="absolute top-10 left-20 text-center w-full">
                <h3 class="text-xs font-bold tracking-[0.4em] text-gray-900">SHCHK&trade;</h3>
            </div>

            <img src="fashion man.jpg" alt="Fashion Man" class="relative z-0.9 h-[80%] w-auto object-contain grayscale mix-blend-multiply brightness-110 contrast-110" />
        </div>

        <div class="px-12 py-10 flex flex-col">
            <div class="flex justify-end items-center gap-8 mb-20">
                <button class="flex items-center gap-2 text-[10px] tracking-widest uppercase font-bold hover:opacity-50 transition">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    Wishlist
                </button>
                <button class="flex items-center gap-2 text-[10px] tracking-widest uppercase font-bold hover:opacity-50 transition">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                    </svg>
                    Cart
                </button>
            </div>

            <div class="mb-12 mr-60">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-bold tracking-widest uppercase">Choose Size</h2>
                    <button class="text-[10px] text-gray-400 underline uppercase tracking-wider hover:text-black">Size Chart</button>
                </div>
                <div class="flex gap-3">
                    <button class="w-12 h-12 rounded-full border border-gray-200 flex items-center justify-center text-sm hover:border-black transition">S</button>
                    <button class="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center text-sm">M</button>
                    <button class="w-12 h-12 rounded-full border border-gray-200 flex items-center justify-center text-sm hover:border-black transition">L</button>
                    <button class="w-12 h-12 rounded-full border border-gray-200 flex items-center justify-center text-sm hover:border-black transition">XL</button>
                </div>
            </div>

            <div class="flex flex-col gap-3 mb-16">
                <button class="w-full bg-black text-white py-5 text-xs font-bold tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-gray-9000 transition">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    ADD TO CART
                </button>
                <button class="w-full border border-black py-5 text-xs font-bold tracking-[0.2em] flex items-center justify-center gap-3 hover:bg-black hover:text-white transition">
                    🖤ADD TO WISHLIST
                </button>
            </div>

            <div class="mt-auto">
                <div class="flex gap-4">
                    <div class="w-20 h-28 bg-gray-100 hover:opacity-70 transition cursor-pointer">
                        <img src="woman 2.jpg" alt="1" class="w-full h-full object-cover">
                    </div>
                    <div class="w-20 h-28 bg-gray-100 hover:opacity-70 transition cursor-pointer">
                        <img src="woman 1.jpg" alt="2" class="w-full h-full object-cover">
                    </div>
                    <div class="w-20 h-28 bg-gray-100 hover:opacity-70 transition cursor-pointer">
                        <img src="woman 3.jpg" alt="3" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
        </div> </div>
</body>
</html>
